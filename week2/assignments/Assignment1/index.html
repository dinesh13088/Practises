<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<main class="app">
  <h1>Weather Finder</h1>
  <p>Search city weather in real time.</p>
  <label for="city-input">City</label>
  <input type="text" id="city-input" placeholder="kathmandu">
  <button id="search-btn" type="button">Search</button>
  <p id="status" aria-live="polite">Enter a city and click search.</p>
<section id="weather-result" aria-live="polite">
  <img  alt="" id="weather-icon">
  <h2>City name</h2>
  <p>Temperature: --</p>
  <p>Condition: --</p>
  
</section>
</main>
    <script src="script.js"></script>
</body>
</html>
