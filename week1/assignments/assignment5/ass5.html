<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-commerce Layout</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="shop-layout">

  <header class="shop-header">
    <h2>MyStore</h2>
  </header>

  <aside class="shop-sidebar">
    <h3>Categories</h3>
    <ul>
      <li>All</li>
      <li>Electronics</li>
      <li>Fashion</li>
      <li>Accessories</li>
    </ul>
  </aside>

  <main class="shop-main">
    <section class="product-grid">

      <article class="product-card">
        <img src="https://plus.unsplash.com/premium_photo-1679513691474-73102089c117?q=80&w=2013&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D" alt="">
        <h4>Wireless Headphones</h4>
        <p>$49.99</p>
        <button>Add to Cart</button>
      </article>

      <article class="product-card">
        <img src="https://images.unsplash.com/photo-1632794716789-42d9995fb5b6?q=80&w=2070&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D" alt="">
        <h4>Smart Watch</h4>
        <p>$79.99</p>
        <button>Add to Cart</button>
      </article>

      <article class="product-card">
        <img src="https://images.unsplash.com/photo-1526170375885-4d8ecf77b99f" alt="">
        <h4>Backpack</h4>
        <p>$39.99</p>
        <button>Add to Cart</button>
      </article>

      <article class="product-card">
        <img src="https://images.unsplash.com/photo-1552346154-21d32810aba3?q=80&w=2070&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D" alt="">
        <h4>Sneakers</h4>
        <p>$59.99</p>
        <button>Add to Cart</button>
      </article>

    </section>
  </main>
  <footer class="shop-footer">
     2026 MyStore
  </footer>

</div>

</body>
</html>
